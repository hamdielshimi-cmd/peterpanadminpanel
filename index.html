<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🎭 Peter Pan Gala — Admin</title>
  <link rel="icon" type="image/png" href="https://ik.imagekit.io/xtj3m9hth/favicon-96x96.png" sizes="96x96" />
  <link rel="shortcut icon" href="https://ik.imagekit.io/xtj3m9hth/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.25);
      --bg: #0f0a14; --bg-card: #1a0f22; --bg-input: #0f0a14;
      --text: #e8dcc8; --text-dim: #a89070;
      --green: #2e7d32; --green-bg: #c8e6c9; --green-text: #1b5e20;
      --red: #c62828; --red-bg: #ffcdd2; --red-text: #7f0000;
      --yellow-bg: #fff9c4; --yellow-text: #7a6000;
    }
    html { font-size: 16px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    header { background: #1A0911; border-bottom: 1px solid var(--gold-dim); padding: 14px 16px; position: sticky; top: 0; z-index: 50; }
    header h1 { color: var(--gold); font-size: 1.05rem; font-weight: 700; }
    header .subtitle { color: var(--text-dim); font-size: 0.75rem; margin-top: 2px; }

    .container { max-width: 960px; margin: 0 auto; padding: 16px; }

    .show-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .show-tabs::-webkit-scrollbar { display: none; }
    .show-tab { flex-shrink: 0; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--gold-dim); background: var(--bg-card); color: var(--text-dim); font-size: 0.82rem; font-weight: 600; cursor: pointer; text-align: center; min-width: 90px; line-height: 1.3; }
    .show-tab.active { background: var(--gold); color: #0f0a14; border-color: var(--gold); }
    .show-tab .show-sub { display: block; font-size: 0.62rem; font-weight: 400; margin-top: 2px; opacity: .8; }

    .summary-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
    @media(min-width:600px){ .summary-grid { grid-template-columns: repeat(4,1fr); } }
    .summary-card { background: var(--bg-card); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 14px 12px; text-align: center; }
    .summary-card .number { font-size: 1.6rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .summary-card .label  { font-size: 0.68rem; color: var(--text-dim); margin-top: 6px; text-transform: uppercase; letter-spacing: .5px; }

    .card { background: var(--bg-card); border: 1px solid var(--gold-dim); border-radius: 14px; padding: 18px 16px; margin-bottom: 14px; }
    .card-title { color: var(--gold); font-size: .95rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: .75rem; color: var(--text-dim); margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 12px 14px; background: var(--bg-input); border: 1px solid var(--gold-dim); border-radius: 10px; color: var(--text); font-size: .95rem; outline: none; -webkit-appearance: none; }
    .field input:focus, .field select:focus { border-color: var(--gold); }
    .search-divider { border-top: 1px solid var(--gold-dim); margin: 14px 0; padding-top: 14px; }

    .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; gap: 8px; -webkit-appearance: none; }
    .btn:active { opacity: .85; }
    .btn-gold  { background: var(--gold); color: #0f0a14; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-red   { background: var(--red);   color: #fff; }
    .btn-ghost { background: transparent; border: 1px solid var(--gold-dim); color: var(--gold); }
    .btn-sm    { padding: 8px 14px; font-size: .78rem; width: auto; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: .4; }

    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .results-header h2 { font-size: .88rem; color: var(--text-dim); }

    /* Pending list item — clickable row showing name + code */
    .pending-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-card); border: 1px solid var(--gold-dim); border-left: 3px solid var(--gold);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: background .15s;
    }
    .pending-row:active { background: rgba(201,168,76,0.08); }
    .pending-row-left .name { font-weight: 700; font-size: .92rem; color: var(--text); }
    .pending-row-left .sub  { font-size: .72rem; color: var(--text-dim); margin-top: 2px; }
    .pending-row-right { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .pending-row-right .code  { font-weight: 700; color: var(--gold); font-size: .9rem; }
    .pending-row-right .timer { font-size: .68rem; margin-top: 2px; color: var(--text-dim); }
    .pending-row-right .timer.urgent { color: #ff6b6b; font-weight: 700; }

    .result-card { background: var(--bg-card); border: 1px solid var(--gold-dim); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .rc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .rc-code { font-size: 1.05rem; font-weight: 700; color: var(--gold); }
    .rc-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; font-size: .8rem; margin-bottom: 8px; }
    .rc-meta div { color: var(--text-dim); }
    .rc-meta div strong { color: var(--text); }
    .rc-seats { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .seat-chip { background: var(--gold-dim); border-radius: 6px; padding: 3px 9px; font-size: .75rem; color: var(--text); }
    .rc-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .rc-actions .btn { flex: 1; min-width: 90px; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .badge-pending   { background: var(--yellow-bg);  color: var(--yellow-text); }
    .badge-confirmed { background: var(--green-bg);   color: var(--green-text); }
    .badge-cancelled { background: var(--red-bg);     color: var(--red-text); }

    #modal { display: none; position: fixed; inset: 0; background: #000000dd; z-index: 100; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    #modal.open { display: flex; }
    .modal-box { background: var(--bg-card); border: 1px solid var(--gold-dim); border-radius: 20px 20px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; position: relative; animation: slideUp .25s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-close { position: absolute; top: 14px; right: 14px; background: var(--bg); border: 1px solid var(--gold-dim); color: var(--text-dim); width: 34px; height: 34px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-box h2 { color: var(--gold); margin-bottom: 16px; font-size: 1.05rem; padding-right: 40px; }
    .detail-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--gold-dim); font-size: .875rem; }
    .detail-row span:first-child { color: var(--text-dim); }
    .detail-row span:last-child  { color: var(--text); font-weight: 600; text-align: right; max-width: 60%; }
    .seats-section { margin-top: 14px; }
    .seats-label { color: var(--text-dim); font-size: .72rem; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
    .modal-actions .btn { flex: 1; min-width: 110px; }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--gold); color: #0f0a14; padding: 13px 22px; border-radius: 12px; font-weight: 700; font-size: .875rem; opacity: 0; transition: all .3s; z-index: 200; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,.4); pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error   { background: var(--red);   color: #fff; }
    #toast.success { background: var(--green); color: #fff; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--gold-dim); border-top-color: var(--gold); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pending-count-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--red); color: #fff; border-radius: 12px; font-size: .7rem; font-weight: 700; padding: 2px 8px; min-width: 20px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>🎭 Peter Pan Gala — Admin</h1>
  <div class="subtitle" id="headerSubtitle">Loading…</div>
</header>

<div class="container">

  <!-- Show selector — choose which show's pending list to manage -->
  <div class="show-tabs" id="showTabs">
    <div class="show-tab active" data-show="all" onclick="selectShow('all')">All Shows</div>
    <div class="show-tab" data-show="1" onclick="selectShow(1)">Cast 1<span class="show-sub">Fri 1:30 PM</span></div>
    <div class="show-tab" data-show="2" onclick="selectShow(2)">Cast 2<span class="show-sub">Fri 6:00 PM</span></div>
    <div class="show-tab" data-show="3" onclick="selectShow(3)">Cast 3<span class="show-sub">Sat 12:00 PM</span></div>
    <div class="show-tab" data-show="4" onclick="selectShow(4)">SURVIVAL<span class="show-sub">Sat 6:00 PM</span></div>
    <div class="show-tab" data-show="5" onclick="selectShow(5)">SURVIVAL<span class="show-sub">Sat 8:00 PM</span></div>
  </div>

  <!-- Summary cards for the selected show -->
  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card"><div class="number" id="sumConfirmed">—</div><div class="label">Confirmed</div></div>
    <div class="summary-card"><div class="number" id="sumPending">—</div><div class="label">Pending</div></div>
    <div class="summary-card"><div class="number" id="sumSeats">—</div><div class="label">Seats Sold</div></div>
    <div class="summary-card"><div class="number" id="sumRevenue">—</div><div class="label">Revenue (EGP)</div></div>
  </div>

  <!-- PENDING REQUESTS — the main daily workflow -->
  <div class="card">
    <div class="card-title">
      ⏳ Pending Requests
      <span class="pending-count-badge" id="pendingBadge">0</span>
    </div>
    <div id="pendingBody">
      <div class="empty-state"><div class="empty-icon">⏳</div><div>Loading…</div></div>
    </div>
  </div>

  <!-- SEARCH — for finding a specific booking quickly -->
  <div class="card">
    <div class="card-title">🔍 Search Bookings</div>
    <div class="field">
      <label>Guest Name (partial ok)</label>
      <input type="text" id="searchName" placeholder="e.g. Ahmed" />
    </div>
    <div class="field">
      <label>Last 4 digits of phone</label>
      <input type="tel" id="searchLast4" placeholder="e.g. 5678" maxlength="4" inputmode="numeric" />
    </div>
    <button class="btn btn-gold" onclick="searchGuest()" id="btnSearchGuest">Search by Name / Phone</button>

    <div class="search-divider">
      <div class="card-title" style="margin-bottom:10px">Search by Code</div>
      <div class="field">
        <label>Booking Code</label>
        <input type="text" id="searchCode" placeholder="e.g. MAD-K7XP" style="text-transform:uppercase" />
      </div>
      <button class="btn btn-ghost" onclick="searchByCode()" id="btnSearchCode">Find Code</button>
    </div>
  </div>

  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <h2 id="resultsLabel">Results</h2>
      <button class="btn btn-ghost btn-sm" onclick="clearResults()">✕ Clear</button>
    </div>
    <div id="resultsBody"></div>
  </div>

</div>

<!-- DETAIL MODAL — shows full info + confirm/cancel -->
<div id="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Booking Details</h2>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
//  CORS FIX: the post() function below sends NO headers at all.
//  Google Apps Script Web Apps reject the CORS preflight that a
//  Content-Type header triggers. Never add headers to fetch().
// ═══════════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzW8zI8dei_QKpREErapvifv_ECrvrRtAl0M5kFRKr4b_Bke8nRPWtpTt-C_SGxtFFM/exec';

const SHOW_INFO = {
  1: { name: 'Peter Pan Cast 1',      date: 'Friday, June 27',   time: '1:30 PM'  },
  2: { name: 'Peter Pan Cast 2',      date: 'Friday, June 27',   time: '6:00 PM'  },
  3: { name: 'Peter Pan Cast 3',      date: 'Saturday, June 28', time: '12:00 PM' },
  4: { name: 'Contemporary SURVIVAL', date: 'Saturday, June 28', time: '6:00 PM'  },
  5: { name: 'Contemporary SURVIVAL', date: 'Saturday, June 28', time: '8:00 PM'  }
};

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentShow = 'all';
let allPending  = [];
let lastSearch  = { type: null };
let refreshTimer = null;

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadSummary();
  loadPending();
  refreshTimer = setInterval(() => { loadPending(); loadSummary(); }, 30000);
});

// ═══════════════════════════════════════════════════════════════
//  SHOW SELECTION — drives both summary and pending list
// ═══════════════════════════════════════════════════════════════
function selectShow(show) {
  currentShow = show;
  document.querySelectorAll('.show-tab').forEach(t => t.classList.toggle('active', t.dataset.show === String(show)));
  loadSummary();
  loadPending();
  clearResults();
}

// ═══════════════════════════════════════════════════════════════
//  HEADER + SUMMARY
// ═══════════════════════════════════════════════════════════════
async function loadSummary() {
  setSummaryLoading(true);
  const showNum = currentShow === 'all' ? null : parseInt(currentShow);
  const res = await post({ action: 'getShowSummary', showNumber: showNum });
  setSummaryLoading(false);

  if (!res.success) { toast('Failed to load summary', true); return; }

  let confirmed = 0, pending = 0, seats = 0, revenue = 0;
  res.summary.forEach(s => { confirmed += s.confirmed; pending += s.pending; seats += s.totalSeats; revenue += s.totalRevenue; });

  document.getElementById('sumConfirmed').textContent = confirmed;
  document.getElementById('sumPending').textContent   = pending;
  document.getElementById('sumSeats').textContent     = seats;
  document.getElementById('sumRevenue').textContent   = 'EGP ' + revenue.toLocaleString();

  // Header subtitle = totals across ALL shows always
  const allRes = currentShow === 'all' ? res : await post({ action: 'getShowSummary', showNumber: null });
  if (allRes.success) {
    let tc = 0, tr = 0;
    allRes.summary.forEach(s => { tc += s.confirmed; tr += s.totalRevenue; });
    document.getElementById('headerSubtitle').textContent = tc + ' confirmed total · EGP ' + tr.toLocaleString() + ' revenue';
  }
}

function setSummaryLoading(loading) {
  ['sumConfirmed','sumPending','sumSeats','sumRevenue'].forEach(id => {
    document.getElementById(id).textContent = loading ? '…' : '—';
  });
}

// ═══════════════════════════════════════════════════════════════
//  PENDING LIST — the core daily workflow
// ═══════════════════════════════════════════════════════════════
async function loadPending() {
  const showNum = currentShow === 'all' ? null : parseInt(currentShow);
  const res = await post({ action: 'getPendingBookings', showNumber: showNum });

  if (!res.success) {
    document.getElementById('pendingBody').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div>Failed to load</div></div>';
    return;
  }

  allPending = res.results || [];
  document.getElementById('pendingBadge').textContent = allPending.length;
  renderPending();
}

function renderPending() {
  const body = document.getElementById('pendingBody');
  if (allPending.length === 0) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div>No pending bookings' + (currentShow !== 'all' ? ' for this show' : '') + '</div></div>';
    return;
  }

  body.innerHTML = allPending.map((b, i) => {
    const urgent = b.minutesLeft <= 5;
    const timerText = b.minutesLeft > 0 ? b.minutesLeft + ' min left' : 'Expiring';
    return `
      <div class="pending-row" onclick="openPendingDetail(${i})">
        <div class="pending-row-left">
          <div class="name">${b.primaryGuest}</div>
          <div class="sub">${b.showName} · ${b.branchDisplay} · ${b.totalSeats} seat${b.totalSeats > 1 ? 's' : ''} · EGP ${b.totalPrice}</div>
        </div>
        <div class="pending-row-right">
          <div class="code">${b.code}</div>
          <div class="timer ${urgent ? 'urgent' : ''}">⏱ ${timerText}</div>
        </div>
      </div>`;
  }).join('');
}

function openPendingDetail(index) {
  openModal(allPending[index]);
}

// ═══════════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════════
async function searchGuest() {
  const name  = document.getElementById('searchName').value.trim();
  const last4 = document.getElementById('searchLast4').value.trim();
  if (!name && !last4) return toast('Enter name or last 4 digits', true);

  setBtnLoading('btnSearchGuest', true, 'Searching…');
  const res = await post({ action: 'searchGuest', name, last4, showNumber: currentShow === 'all' ? null : parseInt(currentShow) });
  setBtnLoading('btnSearchGuest', false, 'Search by Name / Phone');

  if (!res.success) return toast(res.error || 'Search error', true);
  lastSearch = { type: 'guest' };
  renderResults(res.results, `Found ${res.results.length} booking(s)`);
}

async function searchByCode() {
  const code = document.getElementById('searchCode').value.trim().toUpperCase();
  if (!code) return toast('Enter a booking code', true);

  setBtnLoading('btnSearchCode', true, 'Searching…');
  const res = await post({ action: 'search', code, showNumber: currentShow === 'all' ? null : parseInt(currentShow) });
  setBtnLoading('btnSearchCode', false, 'Find Code');

  if (!res.success) return toast(res.error || 'Error', true);
  if (!res.found) return toast('No booking found for ' + code, true);

  lastSearch = { type: 'code' };
  renderResults([res.booking], 'Booking found');
}

function renderResults(bookings, label) {
  document.getElementById('resultsLabel').textContent = label;
  document.getElementById('resultsSection').style.display = 'block';
  const body = document.getElementById('resultsBody');

  if (bookings.length === 0) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>No bookings found</div></div>';
    return;
  }

  body.innerHTML = bookings.map(b => `
    <div class="result-card">
      <div class="rc-header">
        <div class="rc-code">${b.code}</div>
        <span class="badge badge-${b.status.toLowerCase()}">${b.status}</span>
      </div>
      <div class="rc-meta">
        <div><strong>${b.primaryGuest}</strong></div>
        <div>${b.phone}</div>
        <div>${b.showName || ('Show ' + b.show)}</div>
        <div>${b.branchDisplay || b.branch}</div>
        <div>${b.totalSeats} seat${b.totalSeats > 1 ? 's' : ''} · EGP ${b.totalPrice}</div>
        <div>${b.paymentMethod}</div>
      </div>
      <div class="rc-seats">
        ${b.seatGuestPairs.map(p => `<span class="seat-chip">🪑 ${p.seat}</span>`).join('')}
      </div>
      <div class="rc-actions">
        <button class="btn btn-ghost btn-sm" onclick='openModal(${JSON.stringify(b).replace(/\\/g,"\\\\").replace(/'/g,"\\'")} )'>👁 Details</button>
        ${b.status === 'Pending'   ? `<button class="btn btn-green btn-sm" onclick='confirmBooking("${b.code}",${b.show})'>✅ Confirm</button>` : ''}
        ${b.status !== 'Cancelled' ? `<button class="btn btn-red btn-sm"   onclick='cancelBooking("${b.code}",${b.show})'>❌ Cancel</button>`  : ''}
      </div>
    </div>`).join('');

  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearResults() {
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('resultsBody').innerHTML = '';
  ['searchName','searchLast4','searchCode'].forEach(id => document.getElementById(id).value = '');
  lastSearch = { type: null };
}

function refreshAfterAction() {
  loadPending();
  loadSummary();
  if (lastSearch.type === 'guest') searchGuest();
  else if (lastSearch.type === 'code') searchByCode();
}

// ═══════════════════════════════════════════════════════════════
//  MODAL — full detail + confirm/cancel
// ═══════════════════════════════════════════════════════════════
function openModal(booking) {
  const dateStr = booking.timestamp
    ? new Date(booking.timestamp).toLocaleString('en-EG', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
    : '—';

  document.getElementById('modalTitle').textContent = 'Booking ' + booking.code;
  document.getElementById('modalBody').innerHTML = `
    <div class="detail-row"><span>Guest</span><span>${booking.primaryGuest}</span></div>
    <div class="detail-row"><span>Phone</span><span>${booking.phone}</span></div>
    <div class="detail-row"><span>Show</span><span>${booking.showName || ('Show ' + booking.show)}</span></div>
    <div class="detail-row"><span>Date</span><span>${booking.showDate || ''} @ ${booking.showTime || ''}</span></div>
    <div class="detail-row"><span>Branch</span><span>${booking.branchDisplay || booking.branch}</span></div>
    <div class="detail-row"><span>Payment</span><span>${booking.paymentMethod}</span></div>
    <div class="detail-row"><span>Total</span><span>EGP ${booking.totalPrice}</span></div>
    <div class="detail-row"><span>Status</span><span><span class="badge badge-${booking.status.toLowerCase()}">${booking.status}</span></span></div>
    <div class="detail-row"><span>Booked at</span><span>${dateStr}</span></div>
    ${booking.minutesLeft !== undefined ? `<div class="detail-row"><span>Expires in</span><span style="color:${booking.minutesLeft <= 5 ? '#ff6b6b' : 'var(--gold)'}">${booking.minutesLeft} min</span></div>` : ''}
    <div class="seats-section">
      <div class="seats-label">Seats Held</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${booking.seatGuestPairs.map(p => `<span class="seat-chip">🪑 ${p.seat}</span>`).join('')}
      </div>
    </div>`;

  const actions = document.getElementById('modalActions');
  actions.innerHTML = '';

  if (booking.status === 'Pending') {
    const btn = document.createElement('button');
    btn.className = 'btn btn-green';
    btn.innerHTML = '✅ Confirm Booking';
    btn.onclick = () => confirmBooking(booking.code, booking.show);
    actions.appendChild(btn);
  }
  if (booking.status !== 'Cancelled') {
    const btn = document.createElement('button');
    btn.className = 'btn btn-red';
    btn.innerHTML = '❌ Cancel Booking';
    btn.onclick = () => cancelBooking(booking.code, booking.show);
    actions.appendChild(btn);
  }
  if (booking.whatsappLink) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-ghost';
    btn.innerHTML = '💬 WhatsApp Guest';
    btn.onclick = () => window.open(booking.whatsappLink, '_blank');
    actions.appendChild(btn);
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

// ═══════════════════════════════════════════════════════════════
//  CONFIRM / CANCEL
// ═══════════════════════════════════════════════════════════════
async function confirmBooking(code, showNumber) {
  if (!confirm('Confirm booking ' + code + '? Make sure the payment screenshot amount matches.')) return;
  toast('Confirming…');
  const res = await post({ action: 'confirm', code, showNumber });
  if (res.success) {
    toast('✅ Confirmed!', false, 'success');
    closeModal();
    refreshAfterAction();
    if (res.whatsappLink) setTimeout(() => window.open(res.whatsappLink, '_blank'), 400);
  } else {
    toast(res.message || 'Error', true);
  }
}

async function cancelBooking(code, showNumber) {
  if (!confirm('Cancel booking ' + code + '? Seats will be released immediately.')) return;
  toast('Cancelling…');
  const res = await post({ action: 'cancel', code, showNumber });
  if (res.success) {
    toast('Cancelled — seats released', false, 'success');
    closeModal();
    refreshAfterAction();
  } else {
    toast(res.message || 'Error', true);
  }
}

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════

// CORS-safe POST — never add headers here
async function post(body) {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch (e) {
    toast('Network error — check connection', true);
    return { success: false };
  }
}

function setBtnLoading(id, loading, text) {
  const btn = document.getElementById(id);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' + text : text;
}

function toast(msg, isError = false, type = null) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : type ? ' ' + type : '');
  setTimeout(() => el.className = '', 3200);
}

document.getElementById('searchName').addEventListener('keydown',  e => e.key === 'Enter' && searchGuest());
document.getElementById('searchLast4').addEventListener('keydown', e => e.key === 'Enter' && searchGuest());
document.getElementById('searchCode').addEventListener('keydown',  e => e.key === 'Enter' && searchByCode());
</script>
